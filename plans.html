<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Католог</title>
    <style>
        #rt{
            display: flex;  
        }
        #categor{
            border-style: solid;
            border-width: 2px;
            border-color: rgba(123, 122, 122, 0.741);
            padding: 10px;
            border-radius: 20px;
            margin: 10px;
            height: 33%;
            position: relative;
            z-index: 1;

            display: flex;
        }
        #text1{
            color: green;
            pointer-events: none;
        }
        #text2{
            color: blue;
            pointer-events: none;
        }
        body{
            height: 100%;
            width: 100%;
        }
        #par{
           height: 50%;
            width: 50%; 
            padding: 20pxs;
        }
        #text3{
            color: rgba(123, 122, 122, 0.741);
            font-size: 10px
        }
        .data{
            border-style: solid;
            border-width: 2px;
            border-color: rgba(123, 122, 122, 0.741);
            padding: 10px;
            border-radius: 20px;
            margin: 10px;
            height: 20px;
        }
        button{
            border-radius: 10px;
            height: 30px;
        }
        #input1{
            width: 100%;
        }
        #input2{
            width: 90%;
        }
        #para{
            width: 100%;
        }
        #neighbour{
            padding: 10px;
            border-radius: 20px;
            margin: 10px;
            width: 100%;
        }
        #information{
            width: 50%;
            pointer-events: none;
        }
        #mark{
            width: 50%;
            padding: 10px;
            pointer-events: none;
        }
        .fixed-block {
            
            
            padding: 15px;
            background-color: rgba(0, 0, 255, 0.266);
            color: blue;
            font-size: 13px;
            border-radius: 5px;
            width: 50px;
            height: 1px;
            pointer-events: none;

            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="rt">
        <div id="par">
            <h1>Тарифные планы</h1>
            <div id ="categor">
                <div id="information">
                    <h2>Старт</h2>
                    <div id="text2">490 ₽/мес</div>
                    <p id="text1">До 3 пользователей<br>Базовые отчёты</p>
                </div>
                <div id="mark">
                </div>
            </div>
            <div id ="categor">
                <div id="information">
                    <h2>Бизнес</h2>
                    <div id="text2">1 490 ₽/мес</div>
                    <p id="text1">До 20 пользователей<br>Все отчёты<br>Пробный 14 дней</p>
                </div>
                <div id="mark">
                </div>
            </div>
            <div id ="categor">
                <div id="information">
                    <h2>Корпоративный</h2>
                    <div id="text2">4 900 ₽/мес</div>
                    <p id="text1">Без ограничений<br>Приоритетная поддержка</p>
                </div>
                <div id="mark">
                </div>
            </div>
        </div>
        <div id="par">
            <h1>Оформление</h1>
            <div>
                <div id="text3">ТАРИФ</div>
                <div id="trafic" class="data"></div>
            </div>
            <div id="rt">
                <div id="neighbour">
                    <div id="text3">ПЕРИОД</div>                    
                    <div id="periud" class="data"></div>
                </div>
                <div id="neighbour">
                    <div id="text3">ПРОБНЫЙ</div>
                    <div id="proba" class="data"></div>
                </div>
            </div>
            <div>
                <div id="text3">ДАТА НАЧАЛА</div>
                <div id="date" class="data"></div>
            </div>
            <div>
                <div id="text3">ПЕРВОЕ СПИСАНИЕ</div>
                <div id="first" class="data"></div>
            </div>
        <button>Оформить</button>
        <button>Сравнить</button>
        </div>
    </div>
    <script>
        const elements = document.querySelectorAll('[id="categor"]');
        
        const choice = (e) => {

        e.preventDefault();
            mark = document.createElement('div')
            mark.id='fixed-block'
            mark.innerText = 'выбран'
            mark.style.position  = 'relative'
            mark.style.left  = '50%'
            mark.style.top  = '10%'

            
            mark.style.padding= '15px';
            mark.style.backgroundColor= 'rgba(0, 0, 255, 0.266)';
            mark.style.color= 'blue';
            mark.style.fontSize= '13px';
            mark.style.borderRadius= '5px';
            mark.style.width= '50px';
            mark.style.height= '1px';
            mark.style.pointerEvents= 'none';

            mark.style.display= 'flex';
            mark.style.justifyContent= 'center';
            mark.style.alignItems= 'center';
  
            elements.forEach((element) => {
                div = element.querySelector('#mark');
                month_arr= ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек']
                days_in_months = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
                if (element !== e.target) {
                    div.innerHTML = '';
                    element.style.borderColor = 'rgba(123, 122, 122, 0.741)';
                }else{
                    div2 = div.querySelector('div')
                    if(!div2){
                        div.appendChild(mark)

                        name1 = element.querySelector('h2').innerText
                        name2 = element.querySelector('#text2').innerText
                        element.style.borderColor = 'rgb(0, 0, 225)';
                        trafic = document.getElementById('trafic')
                        periud = document.getElementById('periud')
                        proba = document.getElementById('proba')
                        date = document.getElementById('date')
                        first = document.getElementById('first')

                        periud.innerText ='Месяц'
                        s = new Date()
                        year = s.getFullYear()

                        if(year % 4 == 0){
                            days_in_months[1]= 29
                        }

                        month = s.getMonth() + 1
                        day = s.getDate()
                        date.innerText = `${day} ${month_arr[month]}`
                        trafic.innerText = `${name1}•${name2}`

                        if(name1 == "Бизнес"){
                            proba.innerText="14 дней"
                            if(day + 14 > days_in_months[month]){
                                first.innerText = `${day+14-days_in_months[month]}${month_arr[month+1]}•${name2}`
                            }
                            else{
                                first.innerText = `${day+14}${month_arr[month]}•${name2}`
                            }
                        }else{
                            proba.innerText="НЕТ"
                            first.innerText = `${date.innerText}•${name2}`
                        }

                    

                    }
                    
                }
            });
        };

        elements.forEach((element) => {
            element.addEventListener('click', choice);
        });
    </script>
</body>
</html>
