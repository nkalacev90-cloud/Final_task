<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #rt{
            display: flex;
            height: 100%;
            width: 100%;

        }
        #par{
           height: 50%;
            width: 50%; 
            padding: 20px;
            margin: 20px;
        }
        #par1{
            height: 60px;
            width: 50%;
            padding: 10px;
            margin: 20px;
        }
        button{
            border-radius: 10px;
            height: 30px;
        }
        #checkbox{
            height: 10px;
            
        }
        #neighbour{
            margin: 10px;
            width: 100%;
            padding: 10px;
            font-size: 10px;
            font-family: Arial;
        }
        #div1{
            width: 100%;
            border-radius: 10px;
            height: 30px;
            border-style: solid;
            border-width: 2px;
            border-color: rgba(123, 122, 122, 0.741);
        }
        #contener{
            padding: 10px;
            width: 100%;
            
        }
        .status{
            border-radius: 10px;
            background-color: rgba(255, 0, 0, 0.319);
            color: red;
            
            display: flex;
            justify-content: center;
            align-items: center;

            
        }
        .text2{
            color: blue;
        }
        #bad{
            background-color: red;
        }
        #meind{
            background-color: yellow;
        }
        #greate{
            background-color: green;
        }

        .contenet{
            width: 200px;
            height: 20px;
            border-radius: 10px;
            background-color: gray;
        }
        .procent{
            width: 100px;
            height: 20px;
            background-color: green;
            border-radius: 10px;
        }
        #dt{
            margin: 10px;
        }
    </style>
</head>
<body>
    <div id="rt">
         <div id="par">
            <h1>Подписки · по статусам</h1>
            {% for data  in datas %}
            <div id="rt">
                <div id="dt">Актив</div>
                <div class="contenet" id="dt"><div  class="procent"></div></div>
                <div id="dt" class="text2">{{ data }}</div>
            </div>
            {% endfor %}
        </div>
        <div id="par">
            <h1>Выручка по месяцам</h1>
            {% for data  in datas %}
            <div id="rt">
                <div id="dt">Актив</div>
                <div class="contenet" id="dt"><div  class="procent"></div></div>
                <div id="dt" class="text2">{{ data }}</div>
            </div>
            {% endfor %}
        </div>
        
    </div>
</body>
</html>
