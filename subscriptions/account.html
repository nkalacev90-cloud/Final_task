<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #eaeef3;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .navbar .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1a2634;
        }

        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .navbar .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .navbar .nav-links a:hover {
            background: #f0f4f9;
        }

        .navbar .nav-links .active {
            background: #eef3fa;
            color: #2c7be5;
        }

        .navbar .nav-links button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .navbar .nav-links button:hover {
            background: #c0392b;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px 24px 24px;
            border: 1px solid #eaeef3;
        }

        .card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1a2634;
            margin-bottom: 18px;
        }

        .sub-field {
            margin-bottom: 12px;
        }

        .sub-field .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8a9aa8;
            margin-bottom: 4px;
        }

        .sub-field .value {
            font-weight: 600;
            font-size: 16px;
            color: #1a2634;
            background: #f5f7fa;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .sub-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .sub-row .sub-field {
            flex: 1;
            min-width: 120px;
        }

        .auto-renew {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0 16px;
        }

        .auto-renew input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2c7be5;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: #2c7be5;
            color: white;
        }
        .btn-primary:hover {
            background: #1a5fc7;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-success:hover {
            background: #1e8449;
        }

        .btn-pause {
            background: #8e44ad;
            color: white;
        }
        .btn-pause:hover {
            background: #6c3483;
        }

        .btn-resume {
            background: #2ecc71;
            color: white;
        }
        .btn-resume:hover {
            background: #27ae60;
        }

        .no-subscription {
            padding: 20px 0 12px;
        }

        .no-subscription p {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 16px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-active {
            background: #d5f5e3;
            color: #1a7a42;
        }
        .status-trial {
            background: #d6eaf8;
            color: #1a5276;
        }
        .status-paused {
            background: #fdebd0;
            color: #a56b1f;
        }
        .status-cancelled {
            background: #fadbd8;
            color: #b03a2e;
        }
        .status-payment_error {
            background: #fadbd8;
            color: #b03a2e;
        }
        .status-expired {
            background: #e8e8e8;
            color: #555;
        }

        .history-filters {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
            margin-bottom: 12px;
        }

        .history-filters label {
            font-size: 13px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-filters input[type="date"] {
            padding: 6px 10px;
            border: 1px solid #d0d9e3;
            border-radius: 6px;
            background: white;
            font-size: 13px;
        }

        /* ===== НОВЫЙ СТИЛЬ — ИСТОРИЯ С ПОЛЗУНКОМ ===== */
        .history-scroll {
            max-height: 350px;
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid #eaeef3;
            border-radius: 8px;
            padding: 0 4px;
        }

        .history-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .history-scroll::-webkit-scrollbar-track {
            background: #f0f2f5;
            border-radius: 10px;
        }

        .history-scroll::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 10px;
        }

        .history-scroll::-webkit-scrollbar-thumb:hover {
            background: #a0a8b0;
        }

        .history-scroll .table-wrap {
            overflow-x: auto;
        }

        .history-scroll table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .history-scroll thead {
            position: sticky;
            top: 0;
            background: white;
            z-index: 2;
        }

        .history-scroll th {
            background: #f5f7fa;
            padding: 10px 8px;
            border-bottom: 2px solid #e2e8f0;
            text-align: left;
        }

        .history-scroll td {
            padding: 10px 8px;
            border-bottom: 1px solid #edf2f7;
        }

        .history-scroll .empty-row td {
            text-align: center;
            color: #95a5a6;
            padding: 24px 0;
        }

        .payment-status {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .payment-paid {
            background: #d5f5e3;
            color: #1a7a42;
        }
        .payment-failed {
            background: #fadbd8;
            color: #b03a2e;
        }
        .payment-prorated {
            background: #fdebd0;
            color: #a56b1f;
        }
        .payment-pending {
            background: #e8e8e8;
            color: #555;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="navbar">
            <div class="logo">💰 Billing</div>
            <div class="nav-links">
                <a href="plans.html">📦 Тарифы</a>
                <a href="account.html" class="active">👤 Кабинет</a>
                <a href="admin.html" id="adminLink" style="display:none;">⚙️ Админка</a>
                <button onclick="logoutUser()">🚪 Выйти</button>
            </div>
        </div>

        <div class="grid">
            <!-- ЛЕВАЯ КОЛОНКА: ПОДПИСКА -->
            <div class="card">
                <h2>📋 Текущая подписка</h2>
                <div id="subscriptionInfo">
                    <div id="hasSubscription">
                        <div class="sub-field">
                            <div class="label">Тариф</div>
                            <div class="value" id="tariffName">—</div>
                        </div>
                        <div class="sub-row">
                            <div class="sub-field">
                                <div class="label">Статус</div>
                                <div class="value"><span id="statusBadge">—</span></div>
                            </div>
                            <div class="sub-field">
                                <div class="label">След. списание</div>
                                <div class="value" id="nextBilling">—</div>
                            </div>
                        </div>
                        <div class="auto-renew">
                            <input type="checkbox" id="autoRenewCheck" disabled>
                            <label for="autoRenewCheck">Автопродление включено</label>
                        </div>
                        <div class="btn-group" id="actionButtons">
                            <button class="btn btn-primary" id="changeTariffBtn">🔄 Сменить тариф</button>
                            <button class="btn btn-pause" id="pauseBtn">⏸ Приостановить</button>
                            <button class="btn btn-danger" id="cancelBtn">✖ Отменить</button>
                        </div>
                    </div>
                    <div id="noSubscription" class="no-subscription hidden">
                        <p>📭 У вас нет активной подписки</p>
                        <button class="btn btn-success" id="goToPlansBtn">📦 Выбрать тариф</button>
                    </div>
                </div>
            </div>

            <!-- ПРАВАЯ КОЛОНКА: ИСТОРИЯ ПЛАТЕЖЕЙ (с ползунком) -->
            <div class="card">
                <h2>📜 История списаний</h2>

                <div class="history-filters">
                    <label>С <input type="date" id="filterStartDate"></label>
                    <label>По <input type="date" id="filterEndDate"></label>
                    <button class="btn btn-primary" id="applyFiltersBtn">Применить</button>
                </div>

                <div class="history-scroll">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Дата</th>
                                    <th>Тариф</th>
                                    <th>Сумма</th>
                                    <th>Статус</th>
                                    <th>Описание</th>
                                </tr>
                            </thead>
                            <tbody id="paymentsBody">
                                <tr class="empty-row"><td colspan="5">Загрузка...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // ============================================
        // 1. ПРОВЕРКА ВХОДА
        // ============================================
        if (!isLoggedIn()) {
            alert('Сначала войдите в систему');
            window.location.href = 'login.html';
        }

        // ============================================
        // 2. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        const statusMap = {
            'active': { label: '✅ Активна', class: 'status-active' },
            'trial': { label: '🔄 Пробная', class: 'status-trial' },
            'paused': { label: '⏸ Приостановлена', class: 'status-paused' },
            'cancelled': { label: '❌ Отменена', class: 'status-cancelled' },
            'payment_error': { label: '⚠️ Ошибка оплаты', class: 'status-payment_error' },
            'expired': { label: '⏳ Истекла', class: 'status-expired' }
        };

        const paymentStatusMap = {
            'paid': { label: '✅ Оплачено', class: 'payment-paid' },
            'failed': { label: '❌ Ошибка', class: 'payment-failed' },
            'prorated': { label: '🔄 Пересчёт', class: 'payment-prorated' },
            'pending': { label: '⏳ Ожидание', class: 'payment-pending' }
        };

        function getStatusInfo(status) {
            return statusMap[status] || { label: status || '—', class: 'status-active' };
        }

        function getPaymentStatusInfo(status) {
            return paymentStatusMap[status] || { label: status || '—', class: 'payment-pending' };
        }

        // ============================================
// ЗАГРУЗКА ПОДПИСКИ И ВСЕХ ПЛАТЕЖЕЙ
// ============================================
async function loadSubscription() {
    try {
        // Получаем ВСЕ подписки пользователя
        const subscriptions = await getMySubscriptions();
        const hasSub = document.getElementById('hasSubscription');
        const noSub = document.getElementById('noSubscription');
        const actions = document.getElementById('actionButtons');

        // Находим активную подписку (последнюю по дате)
        const sub = subscriptions.length > 0 ? subscriptions[0] : null;

        if (!sub) {
            hasSub.style.display = 'none';
            noSub.style.display = 'block';
            await loadAllPayments();
            return;
        }

        hasSub.style.display = 'block';
        noSub.style.display = 'none';

        // Заполняем данные
        const tariffName = sub.tariff?.name || '—';
        document.getElementById('tariffName').textContent = tariffName;

        const statusInfo = getStatusInfo(sub.status);
        document.getElementById('statusBadge').textContent = statusInfo.label;
        document.getElementById('statusBadge').className = 'status-badge ' + statusInfo.class;

        document.getElementById('nextBilling').textContent =
            sub.next_billing_date ? new Date(sub.next_billing_date).toLocaleDateString('ru-RU') : '—';

        document.getElementById('autoRenewCheck').checked = sub.auto_renew || false;

        // Кнопки (оставляем как было)
        const isPaused = sub.status === 'paused';
        const isCancelled = sub.status === 'cancelled' || sub.status === 'expired';

        if (isCancelled) {
            actions.innerHTML = `
                <span style="color:#e74c3c; font-weight:600;">Подписка отменена</span>
                <button class="btn btn-success" id="goToPlansBtn2">📦 Выбрать новый тариф</button>
            `;
            document.getElementById('goToPlansBtn2')?.addEventListener('click', function() {
                window.location.href = 'plans.html';
            });
        } else if (isPaused) {
            actions.innerHTML = `
                <button class="btn btn-primary" id="changeTariffBtn">🔄 Сменить тариф</button>
                <button class="btn btn-resume" id="resumeBtn">▶️ Возобновить</button>
                <button class="btn btn-danger" id="cancelBtn">✖ Отменить</button>
            `;
            document.getElementById('resumeBtn')?.addEventListener('click', async function() {
                try {
                    await resumeSubscription(sub.id);
                    alert('✅ Подписка возобновлена');
                    await loadSubscription();
                } catch (error) {
                    alert('❌ ' + error.message);
                }
            });
            document.getElementById('changeTariffBtn')?.addEventListener('click', function() {
                window.location.href = 'plans.html?change=true';
            });
            document.getElementById('cancelBtn')?.addEventListener('click', async function() {
                if (!confirm('Отменить подписку?')) return;
                try {
                    await cancelSubscription(sub.id);
                    alert('✅ Подписка отменена');
                    await loadSubscription();
                } catch (error) {
                    alert('❌ ' + error.message);
                }
            });
        } else {
            actions.innerHTML = `
                <button class="btn btn-primary" id="changeTariffBtn">🔄 Сменить тариф</button>
                <button class="btn btn-pause" id="pauseBtn">⏸ Приостановить</button>
                <button class="btn btn-danger" id="cancelBtn">✖ Отменить</button>
            `;
            document.getElementById('changeTariffBtn')?.addEventListener('click', function() {
                window.location.href = 'plans.html?change=true';
            });
            document.getElementById('pauseBtn')?.addEventListener('click', async function() {
                if (!confirm('Приостановить подписку?')) return;
                try {
                    await pauseSubscription(sub.id);
                    alert('⏸ Подписка приостановлена');
                    await loadSubscription();
                } catch (error) {
                    alert('❌ ' + error.message);
                }
            });
            document.getElementById('cancelBtn')?.addEventListener('click', async function() {
                if (!confirm('Отменить подписку?')) return;
                try {
                    await cancelSubscription(sub.id);
                    alert('✅ Подписка отменена');
                    await loadSubscription();
                } catch (error) {
                    alert('❌ ' + error.message);
                }
            });
        }

        // Загружаем ВСЕ платежи (по всем подпискам)
        await loadAllPayments();

        // Проверка на админа
        try {
            const user = await getCurrentUser();
            const adminLink = document.getElementById('adminLink');
            if (user && user.is_admin) {
                adminLink.style.display = 'inline-block';
            } else {
                adminLink.style.display = 'none';
            }
        } catch {
            document.getElementById('adminLink').style.display = 'none';
        }

    } catch (error) {
        console.error('loadSubscription error:', error);
        alert('Ошибка загрузки подписки: ' + error.message);
    }
}

// ============================================
// 3-4 ЗАГРУЗКА ВСЕХ ПЛАТЕЖЕЙ (по всем подпискам)
// ============================================
async function loadAllPayments() {
    const tbody = document.getElementById('paymentsBody');
    const startDate = document.getElementById('filterStartDate').value;
    const endDate = document.getElementById('filterEndDate').value;

    try {
        const payments = await getAllMyPayments(startDate, endDate);

        if (!payments || payments.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Нет платежей</td></tr>';
            return;
        }

        tbody.innerHTML = payments.map(p => {
            const date = new Date(p.payment_date).toLocaleDateString('ru-RU');
            const status = getPaymentStatusInfo(p.status);
            return `
                <tr>
                    <td>${date}</td>
                    <td>${p.tariff_name || '—'}</td>
                    <td>${Number(p.amount).toFixed(2)} ₽</td>
                    <td><span class="payment-status ${status.class}">${status.label}</span></td>
                    <td>${p.description || '—'}</td>
                </tr>
            `;
        }).join('');

    } catch (error) {
        console.error('loadAllPayments error:', error);
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5">Ошибка: ${error.message}</td></tr>`;
    }
}
        // ============================================
        // 5. КНОПКИ
        // ============================================

        document.getElementById('goToPlansBtn')?.addEventListener('click', function() {
            window.location.href = 'plans.html';
        });

        document.getElementById('applyFiltersBtn')?.addEventListener('click', function() {
            loadAllPayments();
        });

        // ============================================
        // 6. ВЫХОД
        // ============================================
        function logoutUser() {
            logout();
        }

        // ============================================
        // 7. АВТОЗАГРУЗКА
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSubscription();
        });
    </script>

</body>
</html>
